<svg xmlns="http://www.w3.org/2000/svg" viewBox="-200 -200 400 400" width="600" height="600">
    <defs>
        <style>
            /* We use transform-box and transform-origin to ensure standard CSS transforms 
               behave exactly like HTML divs regardless of the SVG coordinate system */
            .shape {
                fill: none;
                stroke-width: 2px;
                transform-origin: center;
                transform-box: fill-box;
                animation: realityBend 4s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
            }
            
            /* Staggering delays and neon gradients */
            .s1  { animation-delay: 0.0s; stroke: #00ffcc; }
            .s2  { animation-delay: 0.2s; stroke: #00ccff; }
            .s3  { animation-delay: 0.4s; stroke: #0099ff; }
            .s4  { animation-delay: 0.6s; stroke: #0066ff; }
            .s5  { animation-delay: 0.8s; stroke: #3300ff; }
            .s6  { animation-delay: 1.0s; stroke: #9900ff; }
            .s7  { animation-delay: 1.2s; stroke: #cc00ff; }
            .s8  { animation-delay: 1.4s; stroke: #ff00cc; }
            .s9  { animation-delay: 1.6s; stroke: #ff0066; }
            .s10 { animation-delay: 1.8s; stroke: #ff0000; }

            @keyframes realityBend {
                0% {
                    transform: scale(0.1) rotate(0deg) skew(0deg, 0deg) translate(0px, 0px);
                    opacity: 0;
                }
                50% {
                    transform: scale(0.8) rotate(180deg) skew(30deg, 20deg) translate(40px, -40px);
                    opacity: 1;
                    stroke-width: 6px;
                }
                100% {
                    transform: scale(0.1) rotate(360deg) skew(0deg, 0deg) translate(0px, 0px);
                    opacity: 0;
                }
            }
        </style>
    </defs>
    
    <rect width="100%" height="100%" x="-200" y="-200" fill="#050510" />
    
    <g>
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s1" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s2" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s3" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s4" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s5" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s6" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s7" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s8" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s9" />
        <rect x="-100" y="-100" width="200" height="200" rx="30" class="shape s10" />
    </g>
</svg>